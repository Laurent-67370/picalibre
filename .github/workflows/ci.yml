name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Installation
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      # Suites unitaires (ABI Node pour better-sqlite3)
      - name: Rebuild better-sqlite3 (Node)
        run: npm rebuild better-sqlite3
      - name: Tests moteur d'édition
        run: npx tsx scripts/test-engine.ts
      - name: Tests clusters de visages
        run: npx tsx scripts/test-faces-manage.ts
      - name: Tests movie maker v2
        run: npx tsx scripts/test-movie-v2.ts

      # Build de l'app (ABI Electron)
      - name: Rebuild dépendances natives (Electron)
        shell: bash
        run: |
          # install-app-deps peut dire "finished" sans re-compiler après un rebuild Node
          rm -rf node_modules/better-sqlite3/build
          npx @electron/rebuild -f -w better-sqlite3
      - name: Build electron-vite
        run: npm run build

      # E2E : pipeline complet + parité WebGL dans le vrai Electron
      - name: Assets de test
        run: node scripts/make-test-assets.mjs "${{ runner.temp }}/photos"

      - name: E2E pipeline
        shell: bash
        timeout-minutes: 4
        env:
          PICALIBRE_TEST_SCAN: ${{ runner.temp }}/photos
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            xvfb-run -a npx electron out/main/index.js --no-sandbox 2>&1 | tee e2e-scan.log
          else
            npx electron out/main/index.js 2>&1 | tee e2e-scan.log
          fi

      - name: E2E parité WebGL
        shell: bash
        timeout-minutes: 4
        env:
          PICALIBRE_TEST_WEBGL: '1'
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            xvfb-run -a npx electron out/main/index.js --no-sandbox 2>&1 | tee e2e-webgl.log
          else
            npx electron out/main/index.js 2>&1 | tee e2e-webgl.log
          fi

      - name: E2E galerie mobile (web-server + synchro desktop)
        if: runner.os == 'Linux'
        shell: bash
        timeout-minutes: 4
        run: |
          cd web-server && npm ci --omit=dev && cd ..
          SYNC_TOKEN=ci-token PORT=4120 nohup node web-server/src/index.js > web-server-ci.log 2>&1 &
          for i in $(seq 1 15); do
            curl -s -m 1 -H "Authorization: Bearer ci-token" http://localhost:4120/api/config | grep -q libraryName && break
            sleep 0.5
          done
          PICALIBRE_TEST_WEBSYNC="http://localhost:4120|ci-token" \
            xvfb-run -a npx electron out/main/index.js --no-sandbox 2>&1 | tee e2e-websync.log
          grep -q '"phase":"done"' e2e-websync.log
          COUNT=$(curl -s -H "Authorization: Bearer ci-token" http://localhost:4120/api/photos | node -e "process.stdin.once('data',d=>console.log(JSON.parse(d).length))")
          echo "photos synchronisées côté serveur : $COUNT"
          [ "$COUNT" -gt 0 ]


      # Packaging (sans publication) : AppImage/deb sur Linux, NSIS sur Windows
      #
      # Signature — plomberie prête, inerte tant que les secrets n'existent pas :
      #  · macOS : ajouter les secrets MAC_CSC_LINK (certificat Developer ID
      #    Application en .p12, encodé base64), MAC_CSC_KEY_PASSWORD,
      #    APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD et APPLE_TEAM_ID —
      #    electron-builder signe (hardened runtime + entitlements, voir
      #    build-resources/entitlements.mac.plist) et notarise automatiquement.
      #    Sans ces secrets : signature ad-hoc actuelle (afterPack.js), inchangée.
      #  · Windows : en attente d'acceptation SignPath Foundation (dossier
      #    déposé — voir CODE_SIGNING.md). Une fois le projet accepté,
      #    décommenter l'étape « Signer (SignPath) » ci-dessous et renseigner
      #    SIGNPATH_API_TOKEN + les slugs organisation/projet/politique.
      - name: Package
        shell: bash
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Secrets absents → GitHub transmet des chaînes VIDES, et
          # electron-builder traite « CSC_LINK défini mais vide » comme un
          # chemin de certificat à charger (erreur « not a file », constaté
          # sur le run 30099296200). On ne transmet que les variables
          # réellement renseignées.
          [ -z "$CSC_LINK" ] && unset CSC_LINK CSC_KEY_PASSWORD
          [ -z "$APPLE_ID" ] && unset APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID
          npx electron-builder --publish never 2>&1 | tee package.log

      # - name: Signer (SignPath)   # ← décommenter à l'acceptation du dossier
      #   if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/v')
      #   uses: signpath/github-action-submit-signing-request@v1
      #   with:
      #     api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
      #     organization-id: 'ORGANISATION-ID-SIGNPATH'
      #     project-slug: 'picalibre'
      #     signing-policy-slug: 'release-signing'
      #     github-artifact-id: ''   # voir doc SignPath : signe l'artefact du run
      #     wait-for-completion: true
      #     output-artifact-directory: dist

      - name: E2E sur le binaire packagé (pile native dans l'asar.unpacked)
        if: runner.os == 'Linux'
        shell: bash
        timeout-minutes: 4
        env:
          PICALIBRE_TEST_SCAN: ${{ runner.temp }}/photos
        run: |
          rm -rf ~/.config/picalibre
          xvfb-run -a dist/linux-unpacked/picalibre --no-sandbox 2>&1 | tee e2e-packaged.log
          grep -q "PIPELINE OK" e2e-packaged.log
      - name: Publier les logs E2E en commentaire (diagnostic)
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "**E2E $RUNNER_OS** — run ${{ github.run_id }}"
            for f in e2e-scan.log e2e-webgl.log e2e-websync.log web-server-ci.log e2e-packaged.log package.log; do
              echo; echo "\`$f\` :"; echo '```'
              tail -c 1500 "$f" 2>/dev/null | tr -d '\r' || echo '(absent)'
              echo '```'
            done
          } > comment.md
          gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/comments" -f body="$(cat comment.md)" || true

      - name: Artefacts
        uses: actions/upload-artifact@v4
        with:
          name: picalibre-${{ matrix.os }}
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.yml
            dist/*.blockmap
          if-no-files-found: warn
          retention-days: 14

  release:
    name: Release (installeurs attachés au tag)
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt (pour build-resources/)
        uses: actions/checkout@v4
      - name: Récupérer les artefacts des deux OS
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Ajouter le script d'auto-correction macOS (xattr Gatekeeper)
        run: cp "build-resources/Corriger PicaLibre si besoin.command" dist/
      - name: Publier la release GitHub
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ls -lh dist/
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "${{ github.repository }}" \
            --title "PicaLibre $GITHUB_REF_NAME" \
            --generate-notes \
          || gh release upload "$GITHUB_REF_NAME" dist/* --repo "${{ github.repository }}" --clobber
